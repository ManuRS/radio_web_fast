<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="resources/favicon2.ico" type="image/x-icon">
  <title>Boletines Cadena SER</title>
  <style>
    body {
      font-family: "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #f0f4ff, #e6ecf7);
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    h1 {
      margin-top: 40px;
      font-size: 2rem;
      color: #1a237e;
      text-align: center;
    }

    .status {
      margin-top: 20px;
      font-size: 1.2em;
      color: green;
      text-align: center;
      white-space: pre-line; /* permite saltos de línea con \n */
    }

    /* Botón de reproducción */
    #playButton {
      font-size: 16px;
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      background: red;
      color: white;
      margin-top: 30px;
    }

    /* Responsive */
    @media (max-width: 42em) {
      h1 {
        font-size: 1.5rem;
      }
      #playButton {
        font-size: 14px;
        padding: 10px 20px;
      }
    }

    /* Modal oculto por defecto */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    /* Caja del modal */
    .modal-content {
      background: #fff;
      color: #333;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      width: 80%;
      max-width: 300px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      animation: fadeIn 0.3s ease;
    }

    .modal-content p {
      margin-bottom: 15px;
      font-size: 1rem;
    }

    .buttons {
      display: flex;
      justify-content: space-around;
      gap: 10px;
    }

    .modal-content button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    #stay-btn {
      background: #1a237e;
      color: #fff;
    }

    #exit-btn {
      background: #ff1744;
      color: #fff;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 200px;
      height: 12px;
      background: #ddd;
      border-radius: 10px;
      outline: none;
      transition: background 0.3s;
      accent-color:darkblue;
    }

  </style>
</head>

<body>

  <h1>Solo boletines en directo</h1>

  <!-- Reproductor oculto -->
  <audio id="radio_news" style="display:none;"></audio>
  <audio id="radio_prep" style="display:none;"></audio>
  <audio id="radio_music" style="display:none"></audio>

  <!-- Sliders para el volumen -->
  <div id="status_news" class="status">Volumen noticias</div><br>
  <input type="range" id="radio_news_volume" min="0" max="1" step="0.01" value="1"><br>

  <div id="status_music" class="status">Volumen música</div><br>
  <input type="range" id="radio_music_volume" min="0" max="1" step="0.01" value="0.5"><br>

  <!-- Botón de reproducción único -->
  <button id="playButton">Algo ha salido mal</button>

  <!-- Enlaces para la música -->
  <br><div id="status_news" class="status">Cargar modo música:</div><br><br>

  <div style="display: inline-flex; gap: 10px; align-items: center; font-family: 'Segoe UI', Roboto, sans-serif; font-size: 1rem;">
    <a href="?music=2" style="text-decoration:none; color:white; background:#1a237e; padding:5px 10px; border-radius:5px">LOS40</a>
    <a href="?music=3" style="text-decoration:none; color:white; background:#1a237e; padding:5px 10px; border-radius:5px">CLASSIC</a>
    <a href="?music=4" style="text-decoration:none; color:white; background:#1a237e; padding:5px 10px; border-radius:5px">MEGASTAR</a>
  </div>
  <br><br>
  <div style="display: inline-flex; gap: 10px; align-items: center; font-family: 'Segoe UI', Roboto, sans-serif; font-size: 1rem;">
    <a href="?music=5" style="text-decoration:none; color:white; background:#1a237e; padding:5px 10px; border-radius:5px">ROCKFM</a>
    <a href="?music=6" style="text-decoration:none; color:white; background:#1a237e; padding:5px 10px; border-radius:5px">HITFM</a>
    <a href="?music=1" style="text-decoration:none; color:white; background:#1a237e; padding:5px 10px; border-radius:5px">SOLO NOTICIAS</a>
  </div>

  <!-- Modal salir -->
  <div id="exit-modal" class="modal">
    <div class="modal-content">
      <p><b>Pulsa atrás / desliza de nuevo para salir</b></p>
      <div class="buttons">
        <button id="stay-btn">Seguir en la página</button>
      </div>
    </div>
  </div>

  <script>

    /*====================*/
    /*==   JAVASCRIPT   ==*/
    /*====================*/
    const audio_news = document.getElementById('radio_news');
    const audio_prep = document.getElementById('radio_prep');
    const audio_music = document.getElementById('radio_music');

    const news_volume = document.getElementById('radio_news_volume');
    const music_volume = document.getElementById('radio_music_volume');

    const btn = document.getElementById('playButton');

    let semaforo, interval;
    let fadeAudio_ID, fadeMusic_ID;

    let max_news_volume = 1.0;
    let max_music_volume = 0.5;

    /*============================*/
    /*==  PARAMETROS DE LA URL  ==*/
    /*============================*/

    // URL por defecto
    let streamURL = "https://emisoras.cadenaser.com/CADENASER";
    let musicURL = "none";
  
    // Leer parámetros de la URL
    const params = new URLSearchParams(window.location.search);
    const stream = params.get("stream");
    const music = params.get("music");

    // Elegir stream noticias según parámetro
    if (stream === "2") { // ?stream=2
      streamURL = "https://25533.live.streamtheworld.com/SER_MADRIDAAC.aac";
    } else if (stream === "3") { // ?stream=3
      streamURL = "https://playerservices.streamtheworld.com/api/livestream-redirect/SER_MADRIDAAC.aac";
    } else if (stream === "4") { // ?stream=4
      streamURL = "https://27783.live.streamtheworld.com/SER_MAS_MADRIDAAC.aac";
    } else if (stream === "5") { // ?stream=5
      streamURL = "https://playerservices.streamtheworld.com/api/livestream-redirect/SER_MAS_MADRIDAAC.aac";
    } else {
      streamURL = "https://emisoras.cadenaser.com/CADENASER";
    }

    // Elegir stream música según parámetro
    if (music === "2") { // ?music=2
      musicURL = "https://emisoras.cadenaser.com/LOS40";
    } else if (music === "3") { // ?music=3
      musicURL = "https://emisoras.cadenaser.com/LOS40_CLASSIC";
    } else if (music === "4") { // ?music=4
      musicURL = "https://megastar-cope-rrcast.flumotion.com/cope/megastar.mp3";
    } else if (music === "5") { // ?music=5
      musicURL = "https://rockfm-cope-rrcast.flumotion.com/cope/rockfm.mp3";
    } else if (music === "6") { // ?music=6
      musicURL = "http://hitfm.kissfmradio.cires21.com/hitfm.mp3";
    } else {
      musicURL = "none";
    }

    // Variable a mano para pruebas
    // musicURL = "https://emisoras.cadenaser.com/LOS40";

    /*=========================*/
    /*==   ASIGNAR LAS URL   ==*/
    /*=========================*/

    /* URL de las noticias*/
    console.log(streamURL);
    audio_news.src = streamURL;

    /* URL de la música */ 
    if (musicURL != "none"){
        console.log(musicURL);
        audio_music.src = musicURL;
    } else {
      // No hay música
      var slider = document.getElementById('radio_music_volume');
      slider.disabled = true;
      var st = document.getElementById('status_music');
      st.textContent = "Modo sin música";
    }

    /*================*/
    /*==  HORARIOS  ==*/
    /*================*/

    const horariosPermitidos = [
      { inicio: "07:58:30", fin: "08:20:08" },
      { inicio: "08:58:30", fin: "09:04:20" },
      { inicio: "09:58:30", fin: "10:05:48" },
      { inicio: "10:58:30", fin: "11:05:48" },
      { inicio: "11:58:30", fin: "12:20:08" },
      { inicio: "12:58:30", fin: "13:06:15" },
      { inicio: "13:58:30", fin: "14:06:15" },
      { inicio: "15:58:30", fin: "16:05:18" },
      { inicio: "16:58:30", fin: "17:05:18" },
      { inicio: "17:58:30", fin: "18:05:18" },
      { inicio: "18:58:30", fin: "19:04:20" },
      { inicio: "19:58:30", fin: "20:25:08" },
    ];

    const minuto_hardcode = 59; // 59
    const segundos_hardcode = 44; // 44
    const timetext = true; // Time console log

    /*================*/
    /*==   FECHAS   ==*/
    /*================*/

    function convertirAHoraDecimal(horaStr) {
      const [h, m, s = 0] = horaStr.split(":").map(Number);
      return h + m / 60 + s / 3600;
    }
    
    function horaActualDecimal() {
      const ahora = new Date();
      if(timetext){
        console.log(ahora.getHours()+':'+ahora.getMinutes()+':'+ahora.getSeconds());
      }
      return ahora.getHours() + ahora.getMinutes() / 60 + ahora.getSeconds() / 3600;
    }

    function estaEnHorario() {
      const actual = horaActualDecimal();
      return horariosPermitidos.some(rango => {
        const inicio = convertirAHoraDecimal(rango.inicio);
        const fin = convertirAHoraDecimal(rango.fin);
        return actual >= inicio && actual < fin;
      });
    }

    /*=================================*/
    /*== FUNCIONES AUXILIARES SONIDO ==*/
    /*=================================*/

    // Fade in
    function fadeInVol(audioToFade, interval_ID, max_volume) {
      let suma = 0.06
      if (audioToFade.volume+suma < max_volume){
        audioToFade.volume += suma;
      }else{
        /*Hemos terminado*/
        audioToFade.volume = max_volume;
        clearInterval(interval_ID);
      }
    }

    // Fade out
    function fadeOutVol(audioToFade, interval_ID) {
      let resta = 0.06
      if (audioToFade.volume-resta > 0.0){
        audioToFade.volume -= resta;
      }else{
        /*Hemos terminado*/
        audioToFade.volume = 0.0;
        audioToFade.pause();
        clearInterval(interval_ID);
      }
    }

    // Pin de inicio de desconexión
    function desco_ini(){
      audio_prep.volume = 1.0*max_news_volume;
      audio_prep.src = "sounds/desco_ini_gen.mp3";
      audio_prep.play();
    }

    // Pin de fin de desconexión
    function desco_fin(){
      audio_prep.volume = 0.7*max_news_volume;
      audio_prep.play();
    }

    // Función auxiliar
    function select_random_desco_fin(){
      let num_random_1 = Math.floor(Math.random() * 3);
      let num_random_2 = Math.floor(Math.random() * 4);

      if (music === "2" && num_random_1 == 0) {
        audio_prep.src = "sounds/los40_a.mp3";
        return 32;
      } else if (music === "2" && num_random_1 == 1) {
        audio_prep.src = "sounds/los40_b.mp3";
        return 28;
      } else if (music === "3" && num_random_1 !== 0) {
        audio_prep.src = "sounds/los40c_a.mp3";
        return 9.5;
      } else if (num_random_2 == 0) {
        audio_prep.src = "sounds/cortinilla_conversacion.mp3";
        return 14;
      } else if (num_random_2 == 1) {
        audio_prep.src = "sounds/claim_corto.mp3";
        return 5;
      } else if (num_random_2 == 3) {
        audio_prep.src = "sounds/radio_madrid.mp3";
        return 8;
      } else {
        audio_prep.src = "sounds/desco_fin_hxh.mp3";
        return 5;
      }
    }

    // Pin generico
    function pin(){
      audio_prep.src = "sounds/pin_noid.mp3";
      audio_prep.play();
    }

    /*=======================*/
    /*== FUNCION DIRECTORA ==*/
    /*=======================*/ 
    function actualizarReproduccion(safeMode=false) {

      const enHorario = estaEnHorario();

      if (enHorario && !semaforo && safeMode) {
        /** CARGA - PERIODO DE REPRODUCCIÓN **/

        // Noticias play
        play_news();
        
        // Intervalos rápidos
        clearInterval(interval);
        interval = setInterval(actualizarReproduccion, 1.0 * 1000);

      } else if (enHorario && !semaforo) {
        /** PERIODO DE REPRODUCCIÓN **/

        // Calculo delay
        hora = new Date();
        actual = hora.getMinutes()*60 + hora.getSeconds();
        objetivo = minuto_hardcode*60 + segundos_hardcode;
        delaysecs = objetivo - actual;

        // Noticias play
        play_news(delaysecs * 1000);

        if (delaysecs-3.0 > 0) {
          /// Fade out música + pin
          stop_music( (delaysecs-4.0) * 1000 );
          setTimeout( () => { desco_ini(); }, (delaysecs-3.0) * 1000 );
        } else {
          // No da tiempo, paro musica
          stop_music();
        }

        // Intervalos rápidos
        clearInterval(interval);
        interval = setInterval(actualizarReproduccion, 1.0 * 1000);

      } else if (!enHorario && semaforo && safeMode) {
        /** CARGA - PERIODO DE ESPERA **/

        // Música play
        play_music();

        // Otros
        semaforo = false;
        btn.style.background = '#1a73e8';
        btn.textContent = "Fuera del horario de noticias";
        console.log("Transmisión desactivada");

        // Intervalos relajados
        console.log("== 3. Iniciando bucle ==");
        interval = setInterval(actualizarReproduccion, 20.0 * 1000);     

      } else if (!enHorario && semaforo) {
        /** PERIODO DE ESPERA **/

        // Noticias stop
        stop_news();

        // Pin desco (incluye llamada a play music)
        let t_desco_ini_aux = select_random_desco_fin();
        setTimeout(() => { desco_fin();}, 2.0 * 1000);
        setTimeout(() => { play_music(); }, t_desco_ini_aux * 1000);

        // Otros          
        semaforo = false;
        btn.style.background = '#1a73e8';
        btn.textContent = "Fuera del horario";
        console.log("Transmisión desactivada");

        // Intervalos relajados
        clearInterval(interval);
        interval = setInterval(actualizarReproduccion, 20.0 * 1000);

      } 
    }

    /*===========================*/
    /*==   PLAY / STOP AUDIO   ==*/
    /*===========================*/

    /* Reproducir noticias */
    function play_news(delay=0) {

      audio_news.volume = 0.01;
      audio_news.load();
      audio_news.play();

      semaforo = true;

      if (delay>0.0){
        // Otros cuando hay delay
        btn.style.background = 'brown';
        btn.textContent = "Transmisión de noticias preparada";
        console.log("Transmisión preparada");
      } 
   
      setTimeout(() => {
        // El fade in lleva retraso
        fadeAudio_ID = setInterval(() => {fadeInVol(audio_news, fadeAudio_ID, max_news_volume);}, 100);

        // Otros definitivo
        btn.style.background = 'green';
        btn.textContent = "Trasmitiendo noticias en directo";
        console.log("Transmisión activada");
      }, delay);

    }

    /* Parar noticias */
    function stop_news(){
      fadeAudio_ID = setInterval(() => {fadeOutVol(audio_news, fadeAudio_ID);}, 150);
    }

    /* Reproducir música */
    function play_music() {
      if (musicURL != "none"){
        // Reiniciar con fade in
        audio_music.volume = 0.01;
        audio_music.load();
        audio_music.play();
        fadeMusic_ID = setInterval(() => {fadeInVol(audio_music, fadeMusic_ID, max_music_volume);}, 300);
      }
    }

    /* Parar música */
    function stop_music(delay=0) {
      if (musicURL != "none"){
        // Para con delay opcional
        setTimeout(() => {
          fadeMusic_ID = setInterval(() => {fadeOutVol(audio_music, fadeMusic_ID);}, 100);
        }, delay);
      }
    }
    
    /*===========================*/
    /*==    MAIN FUNCTION      ==*/
    /*===========================*/

    // La llamada está en el listerner del botón "btn"
    function main_function (){
      console.log("== 1. Definiendo semaforo ==");
      semaforo = estaEnHorario() ? false : true;
      console.log("Semaforo " + semaforo);
  
      console.log("== 2. Comprobación inicial ==");
      actualizarReproduccion(true);  
    }

    /*===========================*/
    /*==  INTERACCIÓN USUARIO  ==*/
    /*===========================*/
    
    // Volumen de las noticias
    news_volume.addEventListener("input", (e) => {
      max_news_volume = e.target.value;
      audio_news.volume = e.target.value;
    });

    // Volumen de la música
    music_volume.addEventListener("input", (e) => {
      max_music_volume = e.target.value;
      audio_music.volume = e.target.value;
    });

    // Pulsar el botón para empezar
    btn.textContent = "Haz click aquí para otorgar permisos";
    btn.addEventListener('click', () => {
      pin();
      setTimeout(() => { main_function(); }, 1200);
    },{once:true});
    
    // Referencias al modal y boton salida
    const exitModal = document.getElementById("exit-modal");
    const stayBtn = document.getElementById("stay-btn");

    // Interceptar botón atrás
    window.addEventListener("load", () => {
      history.pushState(null, "", location.href);
      window.addEventListener("popstate", () => {
        // Mostrar modal en vez de cerrar
        exitModal.style.display = "flex";
        history.pushState(null, "", location.href); // volvemos a bloquear
      });
    });

    // Botón "Seguir escuchando"
    stayBtn.addEventListener("click", () => {
      exitModal.style.display = "none";
    });

    // Android media
    if ('mediaSession' in navigator) {
      navigator.mediaSession.metadata = new MediaMetadata({
        title: 'Radio en directo',
        artwork: [
          { src: 'resources/mesa_audio.webp', type: 'image/jpeg' },
        ]
      });
    }

  </script>
</body>
</html>
