<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="resources/favicon2.ico" type="image/x-icon">
  <title>Boletines Cadena SER</title>
  <style>
    body {
      font-family: "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #f0f4ff, #e6ecf7);
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    h1 {
      margin-top: 40px;
      font-size: 2rem;
      color: #1a237e;
      text-align: center;
    }

    #status {
      margin-top: 20px;
      font-size: 1.2em;
      color: green;
      text-align: center;
      white-space: pre-line; /* permite saltos de línea con \n */
    }

    /* Botón de reproducción */
    #playButton {
      font-size: 16px;
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      background: #1a73e8;
      color: white;
      margin-top: 30px;
    }

    /* Responsive */
    @media (max-width: 42em) {
      h1 {
        font-size: 1.5rem;
      }
      #playButton {
        font-size: 14px;
        padding: 10px 20px;
      }
    }

    /* Modal oculto por defecto */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    /* Caja del modal */
    .modal-content {
      background: #fff;
      color: #333;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      width: 80%;
      max-width: 300px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      animation: fadeIn 0.3s ease;
    }

    .modal-content p {
      margin-bottom: 15px;
      font-size: 1rem;
    }

    .buttons {
      display: flex;
      justify-content: space-around;
      gap: 10px;
    }

    .modal-content button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    #stay-btn {
      background: #1a237e;
      color: #fff;
    }

    #exit-btn {
      background: #ff1744;
      color: #fff;
    }

  </style>
</head>
<body>

  <h1>Solo boletines en directo</h1>
  <div id="status"></div>

  <!-- Reproductor oculto -->
  <audio id="radio" style="display:none;"></audio>

  <!-- Botón de reproducción único -->
  <button id="playButton">Algo ha salido mal</button>

  <!-- Modal salir -->
  <div id="exit-modal" class="modal">
    <div class="modal-content">
      <p><b>Pulsa atrás / desliza de nuevo para salir</b></p>
      <div class="buttons">
        <button id="stay-btn">Seguir en la página</button>
      </div>
    </div>
  </div>

  <script>
    const audio = document.getElementById('radio');
    const status = document.getElementById('status');
    const btn = document.getElementById('playButton');

    // Por defecto
    let streamURL = "https://emisoras.cadenaser.com/CADENASER";
    // ?stream=b
    const streamURL_alt = "https://25533.live.streamtheworld.com/SER_MADRIDAAC.aac";

    // Leer parámetros de la URL
    const params = new URLSearchParams(window.location.search);
    const stream = params.get("stream");

    // Elegir stream según parámetro
    if (stream === "b") {
      streamURL = streamURL_alt;
    }
    
    // Aplicar al src
    console.log(streamURL);
    audio.src = streamURL;
    var semaforo;

    const horariosPermitidos = [
      { inicio: "07:59:00", fin: "08:20:30" },
      { inicio: "08:59:00", fin: "09:05:00" },
      { inicio: "09:59:00", fin: "10:06:00" },
      { inicio: "10:59:00", fin: "11:06:00" },
      { inicio: "11:59:00", fin: "12:21:20" },
      { inicio: "12:59:00", fin: "13:06:20" },
      { inicio: "13:59:00", fin: "14:06:20" },
      { inicio: "15:59:00", fin: "16:05:30" },
      { inicio: "16:59:00", fin: "17:05:30" },
      { inicio: "17:59:00", fin: "18:05:30" },
      { inicio: "18:59:00", fin: "19:04:30" },
      { inicio: "19:59:00", fin: "20:25:30" },
    ];

    function convertirAHoraDecimal(horaStr) {
      const [h, m, s = 0] = horaStr.split(":").map(Number);
      return h + m / 60 + s / 3600;
    }
    
    function horaActualDecimal() {
      const ahora = new Date();
      console.log(ahora.getHours()+':'+ahora.getMinutes()+':'+ahora.getSeconds());
      return ahora.getHours() + ahora.getMinutes() / 60 + ahora.getSeconds() / 3600;
    }

    function estaEnHorario() {
      const actual = horaActualDecimal();
      return horariosPermitidos.some(rango => {
        const inicio = convertirAHoraDecimal(rango.inicio);
        const fin = convertirAHoraDecimal(rango.fin);
        return actual >= inicio && actual < fin;
      });
    }

    function actualizarReproduccion() {
      const enHorario = estaEnHorario();
      if (enHorario && !semaforo) {
        audio.load();
        audio.play();
        status.textContent = "Transmisión en vivo activa";
        semaforo = true;
        console.log("Transmisión activada");
      } else if (!enHorario && semaforo) {
        audio.pause();
        status.innerHTML  = "Esperando<br>(Fuera del horario de transmisión)";
        semaforo = false;
        console.log("Transmisión desactivada");
      } 
    }

    // Comenzamos
    btn.textContent = "Haz click aquí para otorgar permisos";
    
    console.log("Iniciando semaforo");
    semaforo = estaEnHorario() ? false : true;

    console.log("Comprobación inicial");
    actualizarReproduccion();

    console.log("== Iniciando bucle ==");
    setInterval(actualizarReproduccion, 4000);

    // Pulsar el boton asegura un mejor funcionamiento
    btn.addEventListener('click', () => {
      btn.style.display = "none";
      return;
    });
    
    // Referencias al modal y botones
    const exitModal = document.getElementById("exit-modal");
    const stayBtn = document.getElementById("stay-btn");

    // Interceptar botón atrás
    window.addEventListener("load", () => {
      history.pushState(null, "", location.href);

      window.addEventListener("popstate", () => {
        // Mostrar modal en vez de cerrar
        exitModal.style.display = "flex";
        history.pushState(null, "", location.href); // volvemos a bloquear
      });
    });

    // Botón "Seguir escuchando"
    stayBtn.addEventListener("click", () => {
      exitModal.style.display = "none";
    });

  </script>
</body>
</html>
