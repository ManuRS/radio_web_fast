<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="resources/favicon2.ico" type="image/x-icon">
  <title>Boletines Cadena SER</title>
  <style>
    body {
      font-family: "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #f0f4ff, #e6ecf7);
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    h1 {
      margin-top: 40px;
      font-size: 2rem;
      color: #1a237e;
      text-align: center;
    }

    #status {
      margin-top: 20px;
      font-size: 1.2em;
      color: green;
      text-align: center;
      white-space: pre-line; /* permite saltos de línea con \n */
    }

    /* Botón de reproducción */
    #playButton {
      font-size: 16px;
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      background: #1a73e8;
      color: white;
      margin-top: 30px;
    }

    /* Responsive */
    @media (max-width: 42em) {
      h1 {
        font-size: 1.5rem;
      }
      #playButton {
        font-size: 14px;
        padding: 10px 20px;
      }
    }

    /* Modal oculto por defecto */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    /* Caja del modal */
    .modal-content {
      background: #fff;
      color: #333;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      width: 80%;
      max-width: 300px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      animation: fadeIn 0.3s ease;
    }

    .modal-content p {
      margin-bottom: 15px;
      font-size: 1rem;
    }

    .buttons {
      display: flex;
      justify-content: space-around;
      gap: 10px;
    }

    .modal-content button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    #stay-btn {
      background: #1a237e;
      color: #fff;
    }

    #exit-btn {
      background: #ff1744;
      color: #fff;
    }

  </style>
</head>
<body>

  <h1>Solo boletines en directo</h1>
  <div id="status"></div>

  <!-- Reproductor oculto -->
  <audio id="radio" style="display:none;"></audio>

  <!-- Botón de reproducción único -->
  <button id="playButton">Algo ha salido mal</button>

  <!-- Modal salir -->
  <div id="exit-modal" class="modal">
    <div class="modal-content">
      <p><b>Pulsa atrás / desliza de nuevo para salir</b></p>
      <div class="buttons">
        <button id="stay-btn">Seguir en la página</button>
      </div>
    </div>
  </div>

  <script>
    const audio = document.getElementById('radio');
    const status = document.getElementById('status');
    const btn = document.getElementById('playButton');

    // URL por defecto
    let streamURL = "https://emisoras.cadenaser.com/CADENASER";
  
    // Leer parámetros de la URL
    const params = new URLSearchParams(window.location.search);
    const stream = params.get("stream");

    // Elegir stream según parámetro
    if (stream === "1") { // ?stream=1
      streamURL = "https://emisoras.cadenaser.com/CADENASER";
    } else if (stream === "2") { // ?stream=2
      streamURL = "https://25533.live.streamtheworld.com/SER_MADRIDAAC.aac";
    } else if (stream === "3") { // ?stream=3
      streamURL = "https://playerservices.streamtheworld.com/api/livestream-redirect/SER_MADRIDAAC.aac";
    } else if (stream === "4") { // ?stream=4
      streamURL = "https://27783.live.streamtheworld.com/SER_MAS_MADRIDAAC.aac";
    } else if (stream === "5") { // ?stream=5
      streamURL = "https://playerservices.streamtheworld.com/api/livestream-redirect/SER_MAS_MADRIDAAC.aac";
    }

    // Aplicar al src
    console.log(streamURL);
    audio.src = streamURL;

    var semaforo;
    var fadeAudio;
    var interval;
    var timetext = true;

    const horariosPermitidos = [
      { inicio: "07:59:00", fin: "08:20:15" },
      { inicio: "08:59:00", fin: "09:05:00" },
      { inicio: "09:59:00", fin: "10:05:45" },
      { inicio: "10:59:00", fin: "11:05:45" },
      { inicio: "11:59:00", fin: "12:20:15" },
      { inicio: "12:59:00", fin: "13:06:30" },
      { inicio: "13:59:00", fin: "14:06:30" },
      { inicio: "15:59:00", fin: "16:05:15" },
      { inicio: "16:59:00", fin: "17:05:15" },
      { inicio: "17:59:00", fin: "18:05:15" },
      { inicio: "18:59:00", fin: "19:04:30" },
      { inicio: "19:59:00", fin: "20:25:15" },
    ];

    function convertirAHoraDecimal(horaStr) {
      const [h, m, s = 0] = horaStr.split(":").map(Number);
      return h + m / 60 + s / 3600;
    }
    
    function horaActualDecimal() {
      const ahora = new Date();
      if(timetext){
        console.log(ahora.getHours()+':'+ahora.getMinutes()+':'+ahora.getSeconds());
      }
      return ahora.getHours() + ahora.getMinutes() / 60 + ahora.getSeconds() / 3600;
    }

    function estaEnHorario() {
      const actual = horaActualDecimal();
      return horariosPermitidos.some(rango => {
        const inicio = convertirAHoraDecimal(rango.inicio);
        const fin = convertirAHoraDecimal(rango.fin);
        return actual >= inicio && actual < fin;
      });
    }

    function fadeOutVol() {
      resta = 0.02
      if (audio.volume-resta >= 0.0){
        audio.volume -= resta;
      }else{
        /*Hemos terminado*/
        audio.volume = 0.0;
        audio.pause();
        clearInterval(fadeAudio);
      }
    }

    function fadeInVol() {
      suma = 0.01
      if (audio.volume+suma <= 1.0){
        audio.volume += suma;
      }else{
        /*Hemos terminado*/
        audio.volume = 1.0;
        clearInterval(fadeAudio);
      }
    }

    function actualizarReproduccion(safeMode=false) {

      const enHorario = estaEnHorario();

      if (enHorario && !semaforo && safeMode) {
        /*Página cargada en horario de reproducción*/
        audio.volume = 1.0;
        audio.load();
        audio.play();

        /*Otros*/
        semaforo = true;
        status.textContent = "Transmisión en vivo preparada";
        console.log("Transmisión preparada");

        /*Interval fast*/
        console.log("== 3. Iniciando bucle ==");
        interval = setInterval(actualizarReproduccion, 4000);

      } else if (enHorario && !semaforo) {
        
        /*Reproducir ya*/
        audio.volume = 0.01;
        audio.load();
        audio.play();
        
        /*Fijar cuando subir volumen*/
        hora = new Date();
        minuto_hardcode = 59;
        segundos_hardcode = 40;
        delaysecs = (minuto_hardcode*60 + segundos_hardcode) - (hora.getMinutes()*60 + hora.getSeconds());

        setTimeout(() => {
          fadeAudio = setInterval(fadeInVol, 100);
          status.textContent = "Transmisión en vivo activa";
          console.log("Transmisión activada");
        }, delaysecs*1000);
        
        /*Otros*/
        semaforo = true;
        status.textContent = "Transmisión en vivo preparada";
        console.log("Transmisión preparada");

        /*Interval fast*/
        clearInterval(interval);
        interval = setInterval(actualizarReproduccion, 4000);
        
      } else if (!enHorario && semaforo && safeMode) {
        /*Página cargada*/
        audio.pause();
        semaforo = false;
        status.innerHTML  = "Esperando<br>(Fuera del horario de transmisión)";
        console.log("Transmisión desactivada");

        /*Interval relax*/
        console.log("== 3. Iniciando bucle ==");
        interval = setInterval(actualizarReproduccion, 20000);

      } else if (!enHorario && semaforo) {
        fadeAudio = setInterval(fadeOutVol, 100);
        semaforo = false;
        status.innerHTML  = "Esperando<br>(Fuera del horario de transmisión)";
        console.log("Transmisión desactivada");

        /*Interval relax*/
        clearInterval(interval);
        interval = setInterval(actualizarReproduccion, 20000);
      } 
    }

    // Comenzamos
    btn.textContent = "Haz click aquí para otorgar permisos";
    
    console.log("== 1. Definiendo semaforo ==");
    semaforo = estaEnHorario() ? false : true;
    console.log("Semaforo " + semaforo);

    console.log("== 2. Comprobación inicial ==");
    actualizarReproduccion(true);

    // Pulsar el boton asegura un mejor funcionamiento
    btn.addEventListener('click', () => {
      btn.style.display = "none";
      return;
    });
    
    // Referencias al modal y botones
    const exitModal = document.getElementById("exit-modal");
    const stayBtn = document.getElementById("stay-btn");

    // Interceptar botón atrás
    window.addEventListener("load", () => {
      history.pushState(null, "", location.href);

      window.addEventListener("popstate", () => {
        // Mostrar modal en vez de cerrar
        exitModal.style.display = "flex";
        history.pushState(null, "", location.href); // volvemos a bloquear
      });
    });

    // Botón "Seguir escuchando"
    stayBtn.addEventListener("click", () => {
      exitModal.style.display = "none";
    });

  </script>
</body>
</html>
